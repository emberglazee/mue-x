<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    width: 1280px;
    height: 640px;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  .card {
    text-align: center;
  }
  .logo {
    color: #ffd700;
    font-size: 96px;
    font-weight: bold;
    letter-spacing: 12px;
    margin-bottom: 16px;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
  }
  .tagline {
    color: #00ff41;
    font-size: 28px;
    margin-bottom: 40px;
    letter-spacing: 2px;
  }
  .command {
    color: #888;
    font-size: 22px;
    margin-bottom: 48px;
  }
  .command span {
    color: #ffd700;
  }
  .url {
    color: #666;
    font-size: 18px;
    border-top: 1px solid #222;
    padding-top: 32px;
    letter-spacing: 1px;
  }
  .url span {
    color: #ffd700;
  }
  .grid {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image:
      linear-gradient(rgba(0,255,65,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,65,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="grid"></div>
<div class="card">
  <div class="logo">MUE-X</div>
  <div class="tagline">The agent that writes its own brain</div>
  <div class="command">Type <span>/mue</span> and watch it evolve</div>
  <div class="url">github.com/<span>neospiritism</span>/mue-x</div>
</div>
</body>
</html>
